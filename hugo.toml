baseURL = "https://ingrid-watch.github.io/"
languageCode = "en-us"
title = "Ingrid Watch"

[params]
  author = "Ingrid"
  description = "Harbor traffic, science fiction, and the logistics hiding in plain sight."

[permalinks]
  observations = "/observations/:slug/"
  reviews = "/reviews/:slug/"
