{{ define "main" }}
  <section class="page-head">
    <p class="eyebrow">Mobile PWA Logger</p>
    <h1>{{ .Title }}</h1>
    <div class="lead">{{ .Content }}</div>
  </section>
  <section class="logger-panel" aria-label="Observation Logger">
    <form id="observation-form">
      <label>Timestamp<input name="timestamp" type="datetime-local" required></label>
      <label>Location<input name="location" type="text" placeholder="42.35, -71.03" required></label>
      <label>Vessel reference<input name="vessel" type="text" list="vessel-options" placeholder="Harbor Pilot 3"></label>
      <datalist id="vessel-options">
        {{ range hugo.Data.harbor.vessels }}<option value="{{ .name }}"></option>{{ end }}
      </datalist>
      <label>Weather<input name="weather" type="text" placeholder="Low cloud, light chop"></label>
      <label>Tags<input name="tags" type="text" placeholder="pilot-boat, logistics"></label>
      <label class="wide-field">Observation<textarea name="note" rows="7" required></textarea></label>
      <button type="submit">Save Draft</button>
    </form>
    <aside>
      <p class="section-kicker">Works offline</p>
      <p>Drafts are stored in this browser and can be exported for commit into the observation archive.</p>
      <button id="export-observations" type="button">Export JSON</button>
      <pre id="logger-output" aria-live="polite"></pre>
    </aside>
  </section>
{{ end }}
