{{ define "main" }}
  <article class="article">
    <header class="article-head">
      <p class="eyebrow">{{ .Section | humanize }}</p>
      <h1>{{ .Title }}</h1>
      <p class="meta">{{ .Date.Format "January 2, 2006" }}</p>
    </header>
    <div class="article-body">
      {{ .Content }}
    </div>
  </article>
{{ end }}
