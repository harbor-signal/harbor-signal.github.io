{{ define "main" }}
  <section class="about-page">
    <article class="about-copy">
      <p class="eyebrow">Harbor Signal / About</p>
      <h1>{{ .Title }}</h1>
      <div class="lead">
        {{ .Content | replaceRE "<ul>" "<ul class=\"about-arteries\">" | safeHTML }}
      </div>
    </article>
    <figure class="about-portrait">
      <img src="{{ .Params.portrait | relURL }}" alt="{{ .Params.portrait_alt }}">
      <figcaption>{{ .Params.portrait_alt }}</figcaption>
    </figure>
  </section>
{{ end }}
