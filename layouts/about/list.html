{{ define "main" }}
  <section class="about-page">
    <article class="about-copy">
      <p class="eyebrow">About Harbor Signal</p>
      <h1>{{ .Title }}</h1>
      <div class="lead">
        {{ .Content }}
      </div>
    </article>
    <figure class="about-portrait">
      <img src="{{ "/images/ingrid-about.png" | relURL }}" alt="Ingrid, watching the harbor">
      <figcaption>Ingrid, watching the harbor</figcaption>
    </figure>
  </section>
{{ end }}
