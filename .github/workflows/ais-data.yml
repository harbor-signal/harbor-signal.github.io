name: AIS Data Fetch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ais-data
  cancel-in-progress: true

jobs:
  fetch-ais:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install websockets

      - name: Fetch AIS data
        env:
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
        run: python scripts/fetch_ais.py --bounds "42.28,-71.08,42.38,-70.92" --output data/harbor/vessels.json --history-output data/harbor/sightings_history.json --timeout 60

      - name: Fetch weather
        env:
          OW_API_KEY: ${{ secrets.OW_API_KEY }}
        run: python scripts/fetch_weather.py --lat 42.3601 --lon -71.0589 --output data/harbor/weather.json

      - name: Commit data updates
        run: |
          git config user.name "Harbor Signal Bot"
          git config user.email "bot@harbor-signal.github.io"
          git add data/harbor/vessels.json data/harbor/weather.json data/harbor/sightings_history.json
          if ! git diff --cached --quiet; then
            git commit -m "Update AIS and weather data"
            git push
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.159.0"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
